"""Database models for scraping jobs and extracted results."""

from sqlalchemy import Column, String, Text, Integer, Float, DateTime, JSON, Enum
from sqlalchemy.sql import func
import enum
import uuid

from app.core.database import Base


def generate_uuid():
    return str(uuid.uuid4())


class JobStatus(str, enum.Enum):
    PENDING = "pending"
    RUNNING = "running"
    COMPLETED = "completed"
    FAILED = "failed"
    CANCELLED = "cancelled"


class ScrapeJob(Base):
    __tablename__ = "scrape_jobs"

    id = Column(String(36), primary_key=True, default=generate_uuid)
    url = Column(String(2048), nullable=False)
    urls = Column(JSON, nullable=True)          # for batch jobs
    schema_def = Column(JSON, nullable=True)    # user-defined extraction schema
    status = Column(Enum(JobStatus), default=JobStatus.PENDING)
    progress = Column(Integer, default=0)        # 0-100
    total_urls = Column(Integer, default=1)
    scraped_urls = Column(Integer, default=0)
    error = Column(Text, nullable=True)

    # Scraping options
    use_playwright = Column(Integer, default=0)  # bool stored as int
    wait_for_selector = Column(String(256), nullable=True)
    custom_headers = Column(JSON, nullable=True)
    follow_pagination = Column(Integer, default=0)
    max_pages = Column(Integer, default=5)

    # Timing
    created_at = Column(DateTime(timezone=True), server_default=func.now())
    started_at = Column(DateTime(timezone=True), nullable=True)
    completed_at = Column(DateTime(timezone=True), nullable=True)
    duration_seconds = Column(Float, nullable=True)

    # Output
    result_count = Column(Integer, default=0)
    export_path = Column(String(512), nullable=True)


class ScrapedResult(Base):
    __tablename__ = "scraped_results"

    id = Column(String(36), primary_key=True, default=generate_uuid)
    job_id = Column(String(36), nullable=False, index=True)
    url = Column(String(2048), nullable=False)

    # Raw content
    raw_html = Column(Text, nullable=True)
    page_title = Column(String(512), nullable=True)
    status_code = Column(Integer, nullable=True)

    # AI-extracted structured data
    extracted_data = Column(JSON, nullable=True)
    extraction_tokens_used = Column(Integer, default=0)
    extraction_model = Column(String(64), nullable=True)

    # Metadata
    scraped_at = Column(DateTime(timezone=True), server_default=func.now())
    scrape_duration_ms = Column(Integer, nullable=True)
